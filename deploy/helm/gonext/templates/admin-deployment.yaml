{{- if .Values.admin.enabled -}}
{{- $component := "admin" -}}
{{- $name := include "gonext.componentFullname" (dict "ctx" . "component" $component) -}}
{{- $apiName := include "gonext.componentFullname" (dict "ctx" . "component" "api") -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "gonext.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "gonext.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gonext.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.admin.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "gonext.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.admin.terminationGracePeriodSeconds }}
      {{- include "gonext.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.admin.podSecurityContext | nindent 8 }}
      containers:
        - name: admin-web
          image: {{ include "gonext.image" (dict "ctx" . "image" .Values.admin.image) }}
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ $apiName }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.api.service.port }}"
            {{- with .Values.admin.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.admin.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.admin.readinessProbe | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command:
                  {{- toYaml .Values.admin.preStopCommand | nindent 18 }}
          securityContext:
            {{- toYaml .Values.admin.containerSecurityContext | nindent 12 }}
          {{- if .Values.admin.tmpVolume.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
          {{- end }}
      {{- if .Values.admin.tmpVolume.enabled }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.admin.tmpVolume.sizeLimit }}
        - name: nextjs-cache
          emptyDir: {}
      {{- end }}
      {{- with .Values.admin.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.admin.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.admin.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "gonext.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
  {{- with .Values.admin.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.admin.service.type }}
  ports:
    - name: http
      port: {{ .Values.admin.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "gonext.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 4 }}
{{- end -}}
