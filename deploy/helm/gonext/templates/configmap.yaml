apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gonext.configMapName" . }}
  labels:
    {{- include "gonext.labels" . | nindent 4 }}
data:
{{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- range $k, $v := .Values.extraConfig }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
