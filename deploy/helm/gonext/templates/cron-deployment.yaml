{{- if .Values.cron.enabled -}}
{{- $component := "cron" -}}
{{- $name := include "gonext.componentFullname" (dict "ctx" . "component" $component) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "gonext.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.cron.replicaCount }}
  # Recreate (per §4.7) so the Redis lease flips cleanly rather than
  # being held by two pods during a rolling restart.
  strategy:
    {{- toYaml .Values.cron.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "gonext.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gonext.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.cron.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "gonext.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.cron.terminationGracePeriodSeconds }}
      {{- include "gonext.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.cron.podSecurityContext | nindent 8 }}
      containers:
        - name: core-cron
          image: {{ include "gonext.image" (dict "ctx" . "image" .Values.cron.image) }}
          imagePullPolicy: {{ .Values.cron.image.pullPolicy }}
          args:
            {{- toYaml .Values.cron.args | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "gonext.configMapName" . }}
            - secretRef:
                name: {{ include "gonext.secretName" . }}
          resources:
            {{- toYaml .Values.cron.resources | nindent 12 }}
          {{- with .Values.cron.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # No readinessProbe — cron isn't behind a Service.
          lifecycle:
            preStop:
              exec:
                command:
                  {{- toYaml .Values.cron.preStopCommand | nindent 18 }}
          securityContext:
            {{- toYaml .Values.cron.containerSecurityContext | nindent 12 }}
          {{- if .Values.cron.tmpVolume.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.cron.tmpVolume.enabled }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.cron.tmpVolume.sizeLimit }}
      {{- end }}
      {{- with .Values.cron.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cron.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cron.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
