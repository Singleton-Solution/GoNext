{{- if .Values.api.enabled -}}
{{- $component := "api" -}}
{{- $name := include "gonext.componentFullname" (dict "ctx" . "component" $component) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "gonext.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  {{- if not .Values.api.hpa.enabled }}
  # Emit replicas only when HPA is disabled. Otherwise every `helm upgrade`
  # would reset the count to the static default and override HPA's
  # desiredReplicas. See Helm best-practices: don't set replicas alongside
  # an HPA on the same Deployment.
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "gonext.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gonext.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
      annotations:
        # Trigger a rollout when config or secrets change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "gonext.serviceAccountName" . }}
      # GoNext pods don't talk to the kube-apiserver. Disabling the SA
      # token mount cuts off a stock lateral-movement vector.
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}
      {{- include "gonext.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
        - name: core-api
          image: {{ include "gonext.image" (dict "ctx" . "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          args:
            {{- toYaml .Values.api.args | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gonext.configMapName" . }}
            - secretRef:
                name: {{ include "gonext.secretName" . }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command:
                  {{- toYaml .Values.api.preStopCommand | nindent 18 }}
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          {{- if .Values.api.tmpVolume.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.api.tmpVolume.enabled }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.api.tmpVolume.sizeLimit }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
