{{- if .Values.api.enabled -}}
{{- $component := "api" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gonext.componentFullname" (dict "ctx" . "component" $component) }}
  labels:
    {{- include "gonext.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
  {{- with .Values.api.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.api.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "gonext.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 4 }}
{{- end -}}
