<!doctype html><html><head><meta charset="utf-8">
<title>Logo mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; display: flex; align-items: center; gap: 32px; }
  .mark { width: 96px; height: 96px; }
  .info { display: flex; flex-direction: column; gap: 6px; }
  .info .name { font-family: var(--font-display); font-weight: 800; font-size: 28px; letter-spacing: -0.025em; }
  .info .name em { font-family: var(--font-serif); font-weight: 400; font-style: italic; color: var(--emerald-deep); }
  .info .desc { font-family: var(--font-sans); font-size: 13px; color: var(--fg-muted); max-width: 320px; line-height: 1.5; }
  .row { gap: 6px; align-items: center; margin-top: 6px; }
</style></head><body>
  <img src="../assets/logo-mark.svg" alt="GoNext mark" class="mark" />
  <div class="info">
    <span class="eyebrow">Logomark</span>
    <div class="name">Go<em>Next</em>.</div>
    <div class="desc">A forest-square frame holding an organic leaf-arrow glyph in emerald. Biology meets software, in one mark.</div>
    <div class="row"><span class="tag">SVG</span><span class="tag tag--emerald">Primary</span></div>
  </div>
</body></html>
