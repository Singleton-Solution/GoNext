<!doctype html><html><head><meta charset="utf-8">
<title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; }
  .wordmark { display: flex; align-items: center; gap: 18px; }
  .mark { width: 60px; height: 60px; }
  .name { font-family: var(--font-display); font-weight: 800; font-size: 64px; letter-spacing: -0.035em; color: var(--ink); display: flex; align-items: baseline; line-height: 1; }
  .name em { font-family: var(--font-serif); font-weight: 400; font-style: italic; color: var(--ink); font-size: 1.05em; letter-spacing: -0.01em; }
  .meta-row { margin-top: 14px; display: flex; gap: 18px; }
</style></head><body>
  <span class="eyebrow" style="display: block; margin-bottom: 14px;">Wordmark — Archivo Black + Instrument Serif italic</span>
  <div class="wordmark">
    <img src="../assets/logo-mark.svg" alt="" class="mark" />
    <div class="name">Go<em>Next</em></div>
  </div>
  <div class="meta-row">
    <span class="meta">Go = backend · Next = frontend · always set as one word</span>
  </div>
</body></html>
