<!doctype html><html><head><meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 24px 36px; background: var(--paper); }
  .row { gap: 32px; align-items: flex-start; }
  .demo { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .box { background: var(--paper-2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 18px 22px; font-family: var(--font-sans); font-weight: 500; font-size: 14px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
</style></head><body>
  <span class="eyebrow" style="display: block; margin-bottom: 16px;">Shadows — soft, organic</span>
  <div class="row">
    <div class="demo">
      <div class="box" style="box-shadow: var(--sh-xs);">sh-xs</div>
      <div class="lbl">resting card</div>
    </div>
    <div class="demo">
      <div class="box" style="box-shadow: var(--sh-sm);">sh-sm</div>
      <div class="lbl">subtle lift</div>
    </div>
    <div class="demo">
      <div class="box" style="box-shadow: var(--sh-md);">sh-md</div>
      <div class="lbl">hover state</div>
    </div>
    <div class="demo">
      <div class="box" style="box-shadow: var(--sh-lg);">sh-lg</div>
      <div class="lbl">modal · featured</div>
    </div>
  </div>
</body></html>
