<!doctype html><html><head><meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px 32px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 5px 0; vertical-align: baseline; }
  td.tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 60px; }
  td.size { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 50px; text-align: right; padding-right: 16px; }
  td.smpl { font-family: var(--font-display); font-weight: 800; line-height: 1; color: var(--ink); letter-spacing: -0.03em; }
</style></head><body>
  <span class="eyebrow" style="display: block; margin-bottom: 8px;">Type scale — Archivo 800</span>
  <table>
    <tr><td class="tok">6xl</td><td class="size">96</td><td class="smpl" style="font-size: 44px;">Aa</td></tr>
    <tr><td class="tok">4xl</td><td class="size">44</td><td class="smpl" style="font-size: 28px;">Aa</td></tr>
    <tr><td class="tok">2xl</td><td class="size">24</td><td class="smpl" style="font-size: 20px;">Aa</td></tr>
    <tr><td class="tok">base</td><td class="size">14</td><td class="smpl" style="font-size: 14px; font-family: var(--font-sans); font-weight: 400;">Aa body</td></tr>
    <tr><td class="tok">xs</td><td class="size">12</td><td class="smpl" style="font-size: 12px; font-family: var(--font-sans); font-weight: 500; color: var(--emerald-deep); letter-spacing: 0.12em; text-transform: uppercase;">Aa eyebrow</td></tr>
  </table>
</body></html>
