<!doctype html><html><head><meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 24px 28px; }
  .row { gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
</style></head><body>
  <span class="eyebrow" style="display: block; margin-bottom: 14px;">Buttons</span>
  <div class="row">
    <button class="btn btn--primary">Deploy site<i data-lucide="arrow-right" style="width: 13px; height: 13px;"></i></button>
    <button class="btn btn--emerald">Start free</button>
    <button class="btn">Save draft</button>
    <button class="btn btn--ghost">Cancel</button>
    <button class="btn btn--sm"><i data-lucide="plus" style="width: 12px; height: 12px;"></i>New post</button>
  </div>
  <div class="row" style="margin-bottom: 0;">
    <span class="meta">primary · emerald · default · ghost · sm</span>
  </div>
<script>lucide.createIcons();</script>
</body></html>
