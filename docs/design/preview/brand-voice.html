<!doctype html><html><head><meta charset="utf-8">
<title>Voice</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .row { display: flex; gap: 28px; align-items: flex-start; }
  .col { flex: 1; }
  .ex { font-family: var(--font-display); font-weight: 600; font-size: 19px; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 10px; color: var(--ink); }
  .ex em { font-family: var(--font-serif); font-weight: 400; font-style: italic; color: var(--emerald-deep); font-size: 1.05em; }
  .ex.off { color: var(--fg-faint); }
  .check { color: var(--emerald-deep); margin-right: 8px; font-weight: 600; }
  .x { color: var(--danger); margin-right: 8px; font-weight: 600; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); margin-bottom: 10px; }
</style></head><body>
  <span class="eyebrow" style="display: block; margin-bottom: 14px;">Voice — confident, quiet, alive</span>
  <div class="row">
    <div class="col">
      <div class="label">On-brand</div>
      <div class="ex"><span class="check">✓</span>Sites that <em>live</em> and grow.</div>
      <div class="ex"><span class="check">✓</span>One product for everything you used <em>five</em> for.</div>
    </div>
    <div class="col">
      <div class="label">Off-brand</div>
      <div class="ex off"><span class="x">✕</span>Unlock seamless content experiences.</div>
      <div class="ex off"><span class="x">✕</span>🚀 Supercharge your workflow!</div>
    </div>
  </div>
</body></html>
