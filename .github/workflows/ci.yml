name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Stop in-flight runs when a new commit pushes to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas changed so we only run relevant jobs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'apps/api/**'
              - 'apps/worker/**'
              - 'cli/**'
              - 'packages/go/**'
              - 'go.work'
              - 'go.work.sum'
              - '**/go.mod'
              - '**/go.sum'
            web:
              - 'apps/web/**'
              - 'apps/admin/**'
              - 'packages/ts/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
            docs:
              - 'docs/**'
              - 'adr/**'
              - '*.md'

  lint-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: '.markdownlint.jsonc'
        continue-on-error: true # advisory until rules settle

  lint-go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.work'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test-go:
    needs: [changes, lint-go]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: gonext_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.work'
          cache: true
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:ci@localhost:5432/gonext_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  lint-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-web:
    needs: [changes, lint-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # Aggregate gate. Required check on the branch protection rule.
  ci:
    needs: [lint-docs, lint-go, test-go, lint-web, test-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          # Fail if any required job failed.
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more checks failed"; exit 1
          fi
          # Skipped is OK (paths-filter says the area wasn't changed).
          echo "OK"
