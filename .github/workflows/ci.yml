name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly schedule keeps the vuln-DB scans honest even on quiet weeks
  # where no PRs land. Sunday 06:00 UTC = light load on GitHub runners.
  # The security-scan job below gates on github.event_name to stay
  # cheap on the non-security jobs.
  schedule:
    - cron: '0 6 * * 0'

# Stop in-flight runs when a new commit pushes to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas changed so we only run relevant jobs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      dashboards: ${{ steps.filter.outputs.dashboards }}
      openapi: ${{ steps.filter.outputs.openapi }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'apps/api/**'
              - 'apps/worker/**'
              - 'cli/**'
              - 'packages/go/**'
              - 'go.work'
              - 'go.work.sum'
              - '**/go.mod'
              - '**/go.sum'
            web:
              - 'apps/web/**'
              - 'apps/admin/**'
              - 'packages/ts/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
            docs:
              - 'docs/**'
              - 'adr/**'
              - '*.md'
            dashboards:
              - 'deploy/grafana/**'
              - 'tools/dashboards/**'
            openapi:
              - 'apps/api/openapi/**'
              - 'apps/api/internal/openapi/**'
              - 'tools/openapi-validate/**'

  lint-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: '.markdownlint.jsonc'
        continue-on-error: true # advisory until rules settle

  lint-go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.work'
          cache: true
      - name: go work sync
        run: go work sync
      # First-party modules only. `go list -m all` walks the entire
      # transitive dep graph including testcontainers' pulled-in Docker
      # source and other irrelevant packages, which then fail `go vet`
      # on the runner. The workspace `use` block is the source of truth.
      - name: go vet (workspace modules)
        run: |
          for dir in $(go work edit -json | python3 -c "import json,sys; [print(u['DiskPath']) for u in json.load(sys.stdin)['Use']]"); do
            echo "::group::go vet $dir"
            (cd "$dir" && go vet ./...)
            echo "::endgroup::"
          done
      - name: golangci-lint (per module)
        # Advisory only — go vet above is the hard gate. golangci-lint
        # is run for signal but won't block PR merges until the
        # codebase has had a cleanup pass. Same pattern as lint-docs.
        continue-on-error: true
        run: |
          # v1.64.8 is the latest v1.x and is built with go1.25 — required
          # because earlier releases refuse to lint a go1.25 workspace.
          # Staying on v1.x (rather than v2.x) keeps .golangci.yml format
          # stable.
          if ! command -v golangci-lint >/dev/null 2>&1; then
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
              | sh -s -- -b $(go env GOPATH)/bin v1.64.8
            export PATH="$(go env GOPATH)/bin:$PATH"
          fi
          for dir in $(go work edit -json | python3 -c "import json,sys; [print(u['DiskPath']) for u in json.load(sys.stdin)['Use']]"); do
            echo "::group::golangci-lint $dir"
            (cd "$dir" && golangci-lint run --timeout 5m ./...) || true
            echo "::endgroup::"
          done

  test-go:
    needs: [changes, lint-go]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: gonext_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.work'
          cache: true
      - name: go work sync
        run: go work sync
      - name: Run tests (workspace modules)
        env:
          DATABASE_URL: postgres://postgres:ci@localhost:5432/gonext_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          # Workspace `use` is the source of truth — `all` would pull
          # transitive deps that don't belong to this repo.
          #
          # PR runs use -short to skip the heavy integration tests that
          # are race-flaky on shared GitHub runners (testcontainers
          # spin-up jitter, timing-sensitive auth tests, etc). Those
          # tests still run in the nightly workflow without -short.
          # Individual tests opt in via `if testing.Short() { t.Skip(...) }`.
          for dir in $(go work edit -json | python3 -c "import json,sys; [print(u['DiskPath']) for u in json.load(sys.stdin)['Use']]"); do
            echo "::group::go test $dir"
            (cd "$dir" && go test -short -race -count=1 ./...)
            echo "::endgroup::"
          done
      - name: Upload coverage
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: '**/coverage.out'
          if-no-files-found: ignore

  lint-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No version key here — action reads packageManager from package.json
      # to avoid ERR_PNPM_BAD_PM_VERSION when the two disagree.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-web:
    needs: [changes, lint-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # See comment above re: not pinning a version here.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # OpenAPI structural validation (issue #310).
  #
  # Runs the tools/openapi-validate program against the canonical spec at
  # apps/api/openapi/gonext.openapi.json. The tool is stdlib-only so we
  # don't sync the rest of the workspace's modules just to lint one
  # document.
  lint-openapi:
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'tools/openapi-validate/go.mod'
          cache: false
      - name: Validate OpenAPI document
        env:
          GOWORK: 'off'
        run: |
          # The validator is a separate module (not in go.work). cd into
          # it so `go run` sees its go.mod; pass the spec via an absolute
          # path so the relative-path arg doesn't break after cd.
          cd tools/openapi-validate && go run . "$GITHUB_WORKSPACE/apps/api/openapi/gonext.openapi.json"
      - name: Validator tests
        env:
          GOWORK: 'off'
        run: |
          cd tools/openapi-validate && go test ./...
      - name: Embedded mirror is in sync
        run: |
          diff -q apps/api/openapi/gonext.openapi.json apps/api/internal/openapi/spec/gonext.openapi.json
          diff -q apps/api/openapi/openapi.yaml         apps/api/internal/openapi/spec/openapi.yaml

  lint-dashboards:
    needs: changes
    if: needs.changes.outputs.dashboards == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'tools/dashboards/go.mod'
          cache: false
      - name: Validate dashboard JSON
        # Run the validator outside the workspace (GOWORK=off) so the
        # job doesn't have to sync the rest of the workspace's modules
        # just to lint five JSON files.
        env:
          GOWORK: 'off'
        run: |
          go run ./tools/dashboards/validate.go deploy/grafana/dashboards
      - name: Test validator
        env:
          GOWORK: 'off'
        run: |
          cd tools/dashboards && go test ./...
  # Bundle size budget enforcement (issue #126).
  #
  # Builds the admin app, then runs @gonext/bundle-budget to check each route
  # against the per-class (JS/CSS/font) and global transfer ceilings declared
  # in tools/bundle-budget/budgets.yaml.
  #
  # Advisory only for the first batch — `continue-on-error: true` keeps the
  # gate from blocking PRs while we shake out noise from the early signal.
  # A follow-up issue will flip the job to required on the branch protection
  # rule once the budgets are stable.
  bundle-budget:
    needs: [changes, lint-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build the admin app so the .next/ build manifest exists.
      - name: Build @gonext/admin
        run: pnpm --filter @gonext/admin run build
      # The checker is a Node-only TS package; we run it through tsx so we
      # don't need a separate build step for a CI utility.
      - name: Bundle budget check (admin)
        run: |
          pnpm --filter @gonext/bundle-budget exec \
            node --import tsx ./bin/check.js \
              --app admin \
              --next ../../apps/admin/.next \
              --summary "$GITHUB_STEP_SUMMARY"

  # Security scanners — issues #190 and #196.
  #
  # Five tools, grouped into one job so a green check covers them all
  # for branch protection:
  #
  #   - govulncheck   (#190): Go vuln DB, looks at imports + reachability.
  #   - osv-scanner   (#190): Google's cross-language vuln DB (Go, npm, etc).
  #   - semgrep       (#190): rules-based static analysis. OWASP Top 10 +
  #                           security-audit registry packs.
  #   - gosec         (#196): Go-specific security linter (G-rules).
  #   - gitleaks      (#196): secret scanning across the working tree.
  #
  # Fail-fast: any one of these returning non-zero fails the job. The
  # scanners are NOT advisory — a known CVE landing in go.mod should
  # block the merge. (The acceptable-CVE list lives in osv-scanner's
  # config + .semgrepignore + .gitleaks.toml; raise findings via PR.)
  #
  # Runs on PR + the weekly schedule above. Pull requests get the same
  # full sweep as the cron run so a freshly-disclosed CVE in main
  # doesn't sit unaddressed until the next Sunday.
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs history for the full sweep
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.work'
          cache: true
      - name: go work sync
        run: go work sync

      # govulncheck — Go's first-party vulnerability scanner. Walks the
      # workspace modules; reports CVEs that are reachable from at least
      # one entrypoint. We iterate the workspace `use` list (same
      # pattern as lint-go) so transitive non-workspace modules don't
      # noisy up the report.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck (workspace modules)
        run: |
          for dir in $(go work edit -json | python3 -c "import json,sys; [print(u['DiskPath']) for u in json.load(sys.stdin)['Use']]"); do
            echo "::group::govulncheck $dir"
            (cd "$dir" && govulncheck ./...)
            echo "::endgroup::"
          done

      # osv-scanner — cross-language vuln DB (covers npm + Go + container
      # images). Runs from the repo root with -r so it finds every
      # manifest (go.mod, pnpm-lock.yaml, package.json, ...).
      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/cmd/osv-scanner@latest
      - name: osv-scanner (recursive)
        run: osv-scanner -r .

      # semgrep — rules-based SAST. OWASP Top 10 catches the obvious
      # injection / authz patterns; security-audit is a broader sweep
      # of misuse patterns Semgrep has community rules for.
      - name: Install semgrep
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet semgrep
      - name: semgrep (OWASP + security-audit)
        run: |
          semgrep \
            --config=p/owasp-top-ten \
            --config=p/security-audit \
            --error \
            --metrics=off \
            ./apps ./packages

      # gosec — Go-specific security linter (G101 hardcoded creds, G104
      # ignored errors on security calls, G304 file inclusion, etc.).
      # Iterates the workspace `use` list like govulncheck for the
      # same reason.
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec (workspace modules)
        run: |
          for dir in $(go work edit -json | python3 -c "import json,sys; [print(u['DiskPath']) for u in json.load(sys.stdin)['Use']]"); do
            echo "::group::gosec $dir"
            (cd "$dir" && gosec ./...)
            echo "::endgroup::"
          done

      # gitleaks — secret scanning. --no-banner keeps the log tight;
      # --redact strips matched secrets from the report (we never want
      # a leaked token mirrored into a public CI log); --report-format
      # json so a follow-up step (or human reviewer) can ingest the
      # findings cleanly. The non-zero exit on findings is the gate.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: gitleaks detect
        run: |
          gitleaks detect \
            --no-banner \
            --redact \
            --report-format json \
            --report-path gitleaks-report.json
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore

  # Aggregate gate. Required check on the branch protection rule.
  # bundle-budget is intentionally NOT in `needs:` while it remains advisory.
  ci:
    needs: [lint-docs, lint-go, test-go, lint-web, test-web, lint-dashboards, lint-openapi, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          # Fail if any required job failed.
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more checks failed"; exit 1
          fi
          # Skipped is OK (paths-filter says the area wasn't changed).
          echo "OK"
