name: Compose smoke

# End-to-end smoke test for the docker-compose dev stack. Runs on every
# PR that touches the compose surface (compose files, Dockerfiles, or
# any app source under apps/*). Advisory for now (continue-on-error)
# while the harness stabilises across the 137-PR feature backlog. Flip
# `continue-on-error` to false in a follow-up once the run is green for
# 14 consecutive days on main — the test then becomes a release gate.
#
# Why a separate workflow (not a job in ci.yml):
#   ci.yml builds/tests Go and JS in isolation with no Docker daemon.
#   Compose smoke needs the docker BuildKit + multi-image build flow and
#   takes ~6 minutes; keeping it out of the hot-path CI lane means PRs
#   that don't touch the compose surface skip it entirely.
#
# What it does:
#   1. Checks out the PR ref.
#   2. Builds every image in docker-compose.dev.yml (api, worker, admin,
#      web, migrate/cli) with BuildKit caching keyed on the
#      Dockerfile + go.sum + pnpm-lock hashes.
#   3. Runs tools/compose-smoke/compose-smoke.sh which brings the stack
#      up, polls every service's /healthz, and tears down — including
#      on failure (the script's EXIT trap dumps logs first).
#
# Local equivalent:
#   make up && make smoke

on:
  pull_request:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - '**/Dockerfile'
      - 'apps/**'
      - 'cli/**'
      - 'packages/**'
      - 'migrations/**'
      - 'themes/**'
      - 'tools/compose-smoke/**'
      - '.github/workflows/compose-smoke.yml'

# Stop in-flight runs when a new commit pushes to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Advisory: a red light here does NOT block merge today. See the
    # workflow doc comment for the promotion criteria.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub-hosted runners ship Docker + compose plugin pre-installed,
      # so no install step is required. We do `docker info` as a sanity
      # check so a runner regression surfaces clearly in the log.
      - name: Verify Docker is reachable
        run: docker info

      - name: Show Docker + Compose versions
        run: |
          docker --version
          docker compose version

      # Build images sequentially-but-cached. The smoke script also runs
      # `compose up -d --wait` which builds on demand, but building here
      # first keeps the smoke step's failure mode focused on runtime
      # behavior (couldn't talk to redis, healthz didn't return 200)
      # rather than "image still building when timeout fired".
      - name: Build compose images
        run: |
          docker compose \
            -f docker-compose.yml -f docker-compose.dev.yml \
            build --parallel

      - name: Run compose smoke
        env:
          # Keep the timeout snug on CI — the runner is faster than a
          # local dev box and we want quick failure if a probe stalls.
          HEALTH_TIMEOUT_SECS: "90"
        run: ./tools/compose-smoke/compose-smoke.sh

      # On failure the smoke script already dumps per-service logs as
      # part of its cleanup trap. This step is a belt-and-braces: a
      # full `compose logs` is uploaded as a build artifact for offline
      # triage when the inline log dump is truncated by the runner UI.
      - name: Capture compose logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml -f docker-compose.dev.yml \
            logs --no-color > compose-smoke-logs.txt || true

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-logs-${{ github.run_id }}
          path: compose-smoke-logs.txt
          if-no-files-found: ignore
          retention-days: 14
